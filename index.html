<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ระบบนับจำนวนอาหารและคำนวณยอดขาย</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- Floating Hamburger Icon -->
    <div class="floating-hamburger" onclick="toggleMenu()">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <!-- Nav Content Menu -->
    <div class="nav-content" id="nav-content">
      <div class="nav-brand-menu">KCUFPOS</div>
      <div class="date-picker">
        <label for="current-date">เลือกวันที่: </label>
        <input type="date" id="current-date" />
      </div>
      <div class="nav-links">
        <button class="nav-btn active" onclick="switchTab('tab-home', this)">🏠 หน้าหลัก</button>
        <button class="nav-btn" onclick="switchTab('tab-add-menu', this)">➕ เพิ่มเมนู</button>
        <button class="nav-btn" onclick="switchTab('tab-summary', this)">📊 สรุปยอดขาย</button>
      </div>
    </div>

    <!-- แท็บหน้าหลัก -->
    <div id="tab-home" class="tab-content active-tab">

    <!-- Category Filter -->
    <div class="category-filters" id="category-filters">
      <button class="filter-btn active" onclick="filterCategory('All')">ทั้งหมด</button>
      <button class="filter-btn" onclick="filterCategory('หมูสะเต๊ะ')">หมูสะเต๊ะ</button>
      <button class="filter-btn" onclick="filterCategory('หอยทอด')">หอยทอด</button>
      <button class="filter-btn" onclick="filterCategory('ผัดไทย')">ผัดไทย</button>
      <button class="filter-btn" onclick="filterCategory('เครื่องเคียง')">เครื่องเคียง</button>
    </div>

    <div class="main-layout-grid">
      <!-- Left Sidebar: Cart -->
      <div class="sidebar-left">
        <div class="summary current-order-summary" id="current-order-summary" style="display: none;">
          <h2>รายการอาหารของลูกค้า</h2>
          <h3>รายการปัจจุบัน</h3>
          <div id="current-order-content"></div>
        </div>
      </div>

      <!-- Center: Menu List -->
      <div class="main-content">
        <div class="menu-list" id="menu-list">
          <!-- เมนูอาหารจะถูกสร้างโดย JavaScript -->
        </div>
      </div>

      <!-- Right Sidebar: Payment -->
      <div class="sidebar-right">
        <div class="payment-button-container">
          <!-- ปุ่มชำระเงินจะถูกเพิ่มที่นี่ด้วย JavaScript -->
        </div>
      </div>
    </div>
    
    </div> <!-- ปิดแท็บหน้าหลัก -->

    <!-- แท็บสรุปยอดขาย -->
    <div id="tab-summary" class="tab-content">
      <div class="summary">
        <div id="summary-content">
          <!-- สรุปยอดขายจะถูกสร้างโดย JavaScript -->
        </div>
        <button id="export-csv" class="export-btn">ส่งออกเป็น CSV</button>
        <button id="export-pdf" class="export-btn">ส่งออกเป็น PDF</button>
      </div>
    </div>

    <!-- Modal สำหรับแก้ไขเมนู -->
    <div id="editModal" class="modal">
      <div class="modal-content">
        <span class="close" onclick="closeEditModal()">&times;</span>
        <h3>แก้ไขเมนู</h3>
        <div class="form-group">
          <label for="edit-menu-name">ชื่อเมนู:</label>
          <input type="text" id="edit-menu-name" />
        </div>
        <div class="form-group">
          <label for="edit-menu-price">ราคา (บาท):</label>
          <input type="number" id="edit-menu-price" placeholder="ราคา" min="0" />
        </div>
        <div class="form-group">
          <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
            <input type="checkbox" id="edit-menu-has-sides" style="width: auto;">
            <span>เมนูนี้สามารถเพิ่มเครื่องเคียงได้</span>
          </label>
        </div>
        <button onclick="saveEditMenu()">บันทึก</button>
      </div>
    </div>

    <!-- ข้อความแจ้งเตือนการทำงานแบบ Offline -->
    <div id="offline-notification" class="notification hidden">
      คุณกำลังใช้งานในโหมด Offline
    </div>

    <!-- เพิ่มโมดัลชำระเงินใหม่ -->
    <div id="payment-modal" class="modal">
      <div class="modal-content">
        <span class="close" onclick="closePaymentModal()">&times;</span>
        <h3>ชำระเงิน</h3>
        <div id="payment-order-summary">
          <!-- สรุปรายการสั่งอาหาร -->
        </div>
        <div class="form-group">
          <label for="total-price">ยอดรวม (บาท):</label>
          <input type="text" id="total-price" readonly />
        </div>
        <div class="form-group">
          <label for="receive-amount">รับเงินมา (บาท):</label>
          <input type="number" id="receive-amount" placeholder="กรอกจำนวนเงินที่รับมา" oninput="calculateChange()" min="0" value="0" style="margin-bottom: 0.5rem;" />
          <div class="preset-amount-buttons">
            <button type="button" class="preset-amt-btn" onclick="addReceiveAmount(1)">+1</button>
            <button type="button" class="preset-amt-btn" onclick="addReceiveAmount(5)">+5</button>
            <button type="button" class="preset-amt-btn" onclick="addReceiveAmount(10)">+10</button>
            <button type="button" class="preset-amt-btn" onclick="addReceiveAmount(20)">+20</button>
            <button type="button" class="preset-amt-btn" onclick="addReceiveAmount(50)">+50</button>
            <button type="button" class="preset-amt-btn" onclick="addReceiveAmount(100)">+100</button>
            <button type="button" class="preset-amt-btn" onclick="addReceiveAmount(500)">+500</button>
            <button type="button" class="preset-amt-btn" onclick="addReceiveAmount(1000)">+1000</button>
            <button type="button" class="preset-amt-btn btn-reset" onclick="resetReceiveAmount()">รีเซ็ต</button>
          </div>
        </div>
        <div class="form-group">
          <label for="change-amount">เงินทอน (บาท):</label>
          <input type="text" id="change-amount" readonly class="highlight-input" />
        </div>
        <button id="btn-process-payment" onclick="processPayment()" disabled>ชำระเงินสำเร็จ</button>
      </div>
    </div>

    <!-- แท็บเพิ่มเมนู -->
    <div id="tab-add-menu" class="tab-content">
      <div class="add-menu">
        <h3>เพิ่มเมนูใหม่</h3>
        <div class="form-group">
          <label>หมวดหมู่:</label>
          <div class="radio-options" style="display: flex; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap;">
            <label><input type="radio" name="new-menu-category" value="หมูสะเต๊ะ" checked> หมูสะเต๊ะ</label>
            <label><input type="radio" name="new-menu-category" value="หอยทอด"> หอยทอด</label>
            <label><input type="radio" name="new-menu-category" value="ผัดไทย"> ผัดไทย</label>
            <label><input type="radio" name="new-menu-category" value="เครื่องเคียง"> เครื่องเคียง</label>
          </div>
        </div>
        <div class="form-group">
          <label for="new-menu-name">ชื่อเมนู:</label>
          <input type="text" id="new-menu-name" placeholder="ชื่อเมนู" />
        </div>
        <div class="form-group">
          <label for="new-menu-price">ราคา (บาท):</label>
          <input type="number" id="new-menu-price" placeholder="ราคา" min="0" />
        </div>
        <div class="form-group">
          <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
            <input type="checkbox" id="new-menu-has-sides" style="width: auto;">
            <span>เมนูนี้สามารถเพิ่มเครื่องเคียงได้</span>
          </label>
        </div>
        <button onclick="addNewMenu()">เพิ่มเมนู</button>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/menu.js"></script>
    <script src="js/export.js"></script>
    <script src="js/app.js"></script>

    <!-- Modal สำหรับเลือกเครื่องเคียง -->
    <div id="side-dish-modal" class="modal">
      <div class="modal-content" style="max-width: 500px;">
        <span class="close" onclick="closeSideDishModal()">&times;</span>
        <h2 style="margin-top: 0;">➕ เลือกเครื่องเคียงเพิ่ม</h2>
        <div id="side-dish-list" class="side-dish-grid">
          <!-- รายการเครื่องเคียงจะถูกสร้างโดย JavaScript -->
        </div>
        <button onclick="closeSideDishModal()" style="margin-top: 1.5rem;">เสร็จสิ้น</button>
      </div>
    </div>
    
    <script>
      // ลงทะเบียน Service Worker
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("./service-worker.js")
            .then((registration) => {
              console.log(
                "Service Worker registered successfully:",
                registration.scope
              );
            })
            .catch((err) => {
              console.log("Service Worker registration failed:", err);
            });
        });
      }
    </script>
  </body>
</html>
